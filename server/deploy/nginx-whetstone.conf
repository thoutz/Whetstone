# Install first without TLS; then run certbot (see server-deployment.md).
# certbot --nginx will upgrade this server block to HTTPS.
#
# Dedicated vhost for the iOS app's sslip hostname + proxy/API paths only.
# The public marketing site runs on projectwhetstone.net (see nginx-projectwhetstone.conf).

server {
    listen 80;
    listen [::]:80;
    server_name 149-28-38-55.sslip.io;

    client_max_body_size 50m;

    # Forward full `/whetstone/api/…` URI to Node (explicit path avoids ambiguity with stripped-prefix `proxy_pass`).
    location ^~ /whetstone/api/ {
        proxy_pass http://127.0.0.1:3001/whetstone/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
}

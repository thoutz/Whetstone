# projectwhetstone.net — marketing site + embedded admin SPA + admin API upstream.
#
# Deploy:
#   sudo install -o root -m 0644 nginx-projectwhetstone.conf /etc/nginx/sites-available/projectwhetstone
#   sudo ln -sf /etc/nginx/sites-available/projectwhetstone /etc/nginx/sites-enabled/
#
# TLS: expects Certbot certs at /etc/letsencrypt/live/projectwhetstone.net/ (apex + www).
# Obtain / renew:
#   sudo certbot --nginx -d projectwhetstone.net -d www.projectwhetstone.net
#
# Port 80 only serves ACME http-01 and redirects everything else to HTTPS so the browser
# and /admin/api fetches hit the TLS vhost below (matching certificate).

upstream whetstone_admin_api {
    server 127.0.0.1:3002;
}

upstream whetstone_user_api {
    server 127.0.0.1:3001;
}

upstream whetstone_groq_proxy {
    server 127.0.0.1:8787;
}

server {
    listen 80;
    listen [::]:80;
    server_name projectwhetstone.net www.projectwhetstone.net;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/whetstone-website;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name projectwhetstone.net www.projectwhetstone.net;

    ssl_certificate /etc/letsencrypt/live/projectwhetstone.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/projectwhetstone.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;

    root /var/www/whetstone-website;
    index index.html;

    # Conversation sync (Supabase JWT) — same routes as sslip AI_BASE_URL sibling
    location ^~ /whetstone/api/ {
        proxy_pass http://whetstone_user_api/whetstone/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }

    # Groq / OpenAI-compatible proxy (multipart + vision payloads)
    location = /v1/chat/completions {
        proxy_pass http://whetstone_groq_proxy/v1/chat/completions;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        client_max_body_size 50m;
    }

    # Admin REST API → Node :3002
    location ^~ /admin/api/ {
        proxy_pass http://whetstone_admin_api/admin/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20m;
    }

    location = /admin {
        return 302 /admin/;
    }

    # Admin SPA — avoid stale dashboards after deploy (single-file bundle)
    location ^~ /admin/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri $uri/ /admin/index.html;
    }

    # Web mentor SPA
    location ^~ /app/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri $uri/ /app/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
